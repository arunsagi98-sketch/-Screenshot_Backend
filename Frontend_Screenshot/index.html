<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Scanner Pro</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Glassmorphic Background Elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i class='bx bx-scan'></i></div>
                <h1>Creative Scanner <span class="badge-pro">PRO</span></h1>
            </div>
            <div class="status-badge" id="backend-status">
                <i class='bx bxs-circle'></i> Local Backend
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Left Column: Controls -->
            <div class="controls-panel glass-panel">

                <div class="section-title">
                    <i class='bx bx-link'></i> Target URLs
                </div>
                <div class="input-group">
                    <textarea id="url-input"
                        placeholder="https://www.example.com/&#10;https://www.anotherexample.com/&#10;One URL per line..."></textarea>
                    <div class="input-footer">
                        <span id="url-count">0 valid URLs</span>
                    </div>
                </div>

                <div class="section-title mt-4">
                    <i class='bx bx-image-add'></i> Viewport with Address Bar
                </div>
                <div class="upload-zone" id="upload-zone">
                    <i class='bx bx-cloud-upload'></i>
                    <p>Drag & drop images here, or <span>browse</span></p>
                    <p class="subtext">PNG, JPG, WEBP · up to 10MB each</p>
                    <input type="file" id="file-input" multiple accept="image/png, image/jpeg, image/webp" hidden>
                </div>
                <!-- Preview area for uploaded files -->
                <div class="upload-preview" id="upload-preview"></div>

                <button id="start-btn" class="primary-btn mt-4">
                    <i class='bx bx-play'></i> Start Scan
                </button>
            </div>

            <!-- Right Column: Results -->
            <div class="results-panel">
                <div class="results-header">
                    <div class="results-title">
                        <h2>Recent Results</h2>
                        <span id="results-count">0 scans</span>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button id="bulk-delete-btn" class="secondary-btn"
                            style="color: var(--danger); border-color: rgba(239, 68, 68, 0.3);">
                            <i class='bx bx-trash'></i> Delete Selected
                        </button>
                        <button id="export-ppt-btn" class="secondary-btn"
                            style="color: var(--primary-color); border-color: rgba(99, 102, 241, 0.3);">
                            <i class='bx bxs-file-export'></i> Export PPT
                        </button>
                        <button id="refresh-btn" class="secondary-btn">
                            <i class='bx bx-refresh'></i> Refresh
                        </button>
                    </div>
                </div>

                <div class="results-grid" id="results-grid">
                    <!-- Results will be injected here via JS -->
                    <div class="empty-state">
                        <i class='bx bx-history'></i>
                        <p>No recent scans. Start a new scan to see results.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- PPT Settings Modal -->
    <div id="ppt-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2><i class='bx bxs-file-export'></i> PPT Report Settings</h2>
                <button id="close-modal-btn" class="icon-btn"><i class='bx bx-x'></i></button>
            </div>
            <div class="modal-body">
                <div class="input-field">
                    <label>Campaign Title</label>
                    <input type="text" id="pdf-campaign-title" placeholder="e.g. Chop Steakhouse FY26 Banner Campaign"
                        value="Chop Steakhouse FY26 Banner Campaign">
                </div>
                <div class="input-row">
                    <div class="input-field">
                        <label>Start Date</label>
                        <input type="text" id="pdf-start-date" placeholder="e.g. 09th Apr 2026" value="09th Apr 2026">
                    </div>
                    <div class="input-field">
                        <label>End Date</label>
                        <input type="text" id="pdf-end-date" placeholder="e.g. 22nd Apr 2026" value="22nd Apr 2026">
                    </div>
                </div>
                <div class="input-field">
                    <label>Format</label>
                    <input type="text" id="pdf-format" placeholder="e.g. Banner" value="Banner">
                </div>
            </div>
            <div class="modal-footer">
                <button id="generate-ppt-btn" class="primary-btn"><i class='bx bxs-file-export'></i> Generate
                    Report</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <!-- PptxGenJS for PPT Generation -->
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
